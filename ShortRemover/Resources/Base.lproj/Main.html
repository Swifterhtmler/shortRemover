<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShortRemover</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #210305;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin: 0 auto 28px;
      display: block;
    }

    h1 {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 15px;
      color: #888;
      font-weight: 300;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .step-num {
      font-size: 12px;
      font-weight: 500;
      color: #ff4444;
      background: rgba(255,68,68,0.1);
      border-radius: 6px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
      font-weight: 300;
    }

    .step-text strong {
      color: #f0f0f0;
      font-weight: 500;
    }

    kbd {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      padding: 1px 6px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="../icon2.png" class="icon" alt="ShortRemover">
    <h1>ShortRemover</h1>
    <p class="tagline">Watch YouTube the way it was meant to be — without Shorts</p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Open Safari settings with <kbd>⌘</kbd> + <kbd>,</kbd></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Go to the <strong>Extensions</strong> tab and find ShortRemover</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Enable it and set the destination to <strong>youtube</strong></div>
      </div>
    </div>
  </div>
</body>
</html>
